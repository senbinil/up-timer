# IP-only / direct-exposure app service.
# Exposes port 80 directly — no reverse proxy, no SSL, no labels.
#
# Assembled at install time with:
#   networking/standalone.yml — bridge network

services:
  up-timer:
    image: binilsn/up-timer:${TAG:-latest}
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SOLID_QUEUE_IN_PUMA=true
      - APP_HOST=${APP_HOST:-${DOMAIN}}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - MAIL_PROVIDER=${MAIL_PROVIDER:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@example.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
    volumes:
      - up-timer-storage:/rails/storage
      - up-timer-db:/rails/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - web

volumes:
  up-timer-storage:
  up-timer-db:
